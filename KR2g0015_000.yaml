body:
  text: 寧海將軍固山貝子功績録傳記類二名人之屬提要臣等謹案寧海將軍固山貝子功績録一卷不著撰人姓名所記乃惠獻貝子富喇塔討逆藩耿精忠由台州進兵之事富喇塔為追封貝勒篇古子康熙十三年耿精忠據福建反聖祖仁皇帝命富喇塔為寧海將軍同奉命大將軍康親王傑書統兵討之是年至台州破賊於黃瑞山又連破之紫雲山九重寺山十四年敗其衆於黃土嶺賊將曾養性乘夜遁去遂復黃巖縣直取溫州浙東底定其詳具見宗室王公功績表𫝊及八旗通志中是書蓋即台人所編自十三年四月耿逆初叛至十四年八月賊黨自台州遁還溫州凡所聞見各舉崖略隨條紀録貝子以懿親受寄盡瘁行間勦逆綏良勳猷懋著其間戰功次第自不若國史所載見於奏報者尤為明晰賅備而貝子撫恤軍民安輯士庶以及運籌决勝之實閭閻𫝊述覩記頗真以與本𫝊詳略相校亦時有足資參核者焉書前原有紀略一篇别記貝子台溫二郡戰績又撫嵊事實一篇紀嵊縣土冦應賊貝子遣兵討定之事俱不言何人所撰又平閩功績聞見録一篇為閩人金泳所作乃記貝子自浙進兵平閩之事其文亦頗詳盡謹各仍其舊附録於末以備互考惟原本各條下俱綴以七言絶句凡九十六首詞㫖淺俚無關考證今並從刋刪云乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:187cf28c6f51c28f1dd7d1d520e05a3f50f96b21e87abed31d75d7156b170310
